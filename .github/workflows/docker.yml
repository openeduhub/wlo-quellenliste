name: Docker Build & Publish

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install webcomponent dependencies
        working-directory: webcomponent
        run: npm ci
      - name: Build webcomponent (IIFE bundle)
        working-directory: webcomponent
        run: npx ng build --configuration=production
      - name: Copy bundles to backend
        run: |
          mkdir -p backend/public/wc
          cp webcomponent/dist/wlosources-ng/main.js     backend/public/wc/main.js
          cp webcomponent/dist/wlosources-ng/polyfills.js backend/public/wc/polyfills.js
          cp webcomponent/dist/wlosources-ng/runtime.js   backend/public/wc/runtime.js
          cp webcomponent/dist/wlosources-ng/styles.css   backend/public/wc/styles.css
      - name: Inject slug/short variables
        uses: rlespinasse/github-slug-action@v4
      - name: Login to DockerHub
        uses: azure/docker-login@v1
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Build Docker image
        run: docker build --tag ${{ github.repository }}:${{ env.GITHUB_REF_SLUG }} .
      - name: Push to DockerHub
        run: docker push ${{ github.repository }}:${{ env.GITHUB_REF_SLUG }}
