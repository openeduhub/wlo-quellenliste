name: Docker Build & Publish

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: webcomponent/package-lock.json

      - name: Build web component & copy to backend
        run: |
          chmod +x scripts/build-wc.sh
          ./scripts/build-wc.sh

      - uses: azure/docker-login@v1
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Inject slug/short variables
        uses: rlespinasse/github-slug-action@v4

      - name: Build Docker image
        run: docker build --tag ${{ github.repository }}:${{ env.GITHUB_REF_SLUG }} .

      - name: Publish to DockerHub
        run: docker push ${{ github.repository }}:${{ env.GITHUB_REF_SLUG }}
